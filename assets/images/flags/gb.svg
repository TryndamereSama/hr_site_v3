<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <clipPath id="gb-c"><circle cx="50" cy="50" r="50"/></clipPath>
  <g clip-path="url(#gb-c)">
    <!-- Blue background -->
    <rect width="100" height="100" fill="#012169"/>
    <!-- White saltire (St Andrew) -->
    <line x1="0" y1="0" x2="100" y2="100" stroke="white" stroke-width="20"/>
    <line x1="100" y1="0" x2="0" y2="100" stroke="white" stroke-width="20"/>
    <!-- Red saltire (St Patrick) offset per quadrant -->
    <polygon points="0,0 12,0 50,34 50,16" fill="#c8102e"/>
    <polygon points="100,0 88,0 50,34 50,16" fill="#c8102e"/>
    <polygon points="0,100 12,100 50,66 50,84" fill="#c8102e"/>
    <polygon points="100,100 88,100 50,66 50,84" fill="#c8102e"/>
    <polygon points="0,0 0,12 34,50 16,50" fill="#c8102e"/>
    <polygon points="0,100 0,88 34,50 16,50" fill="#c8102e"/>
    <polygon points="100,0 100,12 66,50 84,50" fill="#c8102e"/>
    <polygon points="100,100 100,88 66,50 84,50" fill="#c8102e"/>
    <!-- White cross -->
    <rect x="0" y="38" width="100" height="24" fill="white"/>
    <rect x="38" y="0" width="24" height="100" fill="white"/>
    <!-- Red cross (St George) -->
    <rect x="0" y="42" width="100" height="16" fill="#c8102e"/>
    <rect x="42" y="0" width="16" height="100" fill="#c8102e"/>
  </g>
</svg>
